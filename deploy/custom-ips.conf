# Custom IP allowlist for embd nginx ingress.
# Format: CIDR 1;
# The "1" maps to $ip_allowed = 1 (allowed) in the geo block.
#
# Add your own IPs here — one per line. Examples:
#
# Your home/office public IP:
# 203.0.113.42/32 1;
#
# A VPN or corporate range:
# 10.0.0.0/8 1;
#
# Allow all private ranges (use with caution):
# 192.168.0.0/16 1;
# 172.16.0.0/12 1;

# Loopback (curl https://127.0.0.1/health from the host)
127.0.0.1/32 1;
# IPv6 loopback (curl https://localhost may use ::1)
::1/128 1;

# Private ranges (Docker bridge, LAN testing — tighten in production)
172.16.0.0/12 1;
192.168.0.0/16 1;
10.0.0.0/8 1;
