[paths]
documents_dir = "./documents"
db_dir        = "./chroma_db"

[ingestion]
# chunk_size: characters per chunk. BGE-M3 supports 8192 tokens, so larger chunks are fine.
# 2000 chars ≈ 400-500 words — gives self-contained passages with better retrieval.
chunk_size    = 2000
# chunk_overlap: characters shared between adjacent chunks. Preserves context at boundaries.
chunk_overlap = 200
# enabled_types: which document types to ingest. Disable any you don't need.
# Available: pdf, epub, txt, md, docx, xlsx
# docx requires: pip install 'embd[docx]'  (python-docx)
# xlsx requires: pip install 'embd[xlsx]'  (openpyxl)
#
# Image OCR: embedded images in PDF and DOCX are automatically OCR'd.
# Local Mac (quality): pip install 'embd[ocr]' — Surya on MPS/CUDA + Tesseract fallback.
# Surya needs transformers 4.56–4.x (pins in pyproject); transformers 5.x breaks Surya today.
# Server / Docker: pip install 'embd[ocr-cpu]' + apt-get install tesseract-ocr (CPU only).
# On macOS you can add Tesseract for the CPU fallback: brew install tesseract
#
# ocr_embedded_images: when to OCR images inside PDF/DOCX (huge speed difference).
#   "when_no_text" — only when the page/body has no extractable text (scanned PDFs, images of slides).
#   "always" — OCR every embedded image even when text exists (very slow on PDFs with logos/icons).
#   "never" — no image OCR.
# ocr_backend: "auto" (Surya on MPS/CUDA if available, else Tesseract),
#              "surya" (high-quality document OCR; needs GPU or falls back to Tesseract),
#              "tesseract" (CPU only; use ocr_tesseract_lang for script, e.g. "eng+deu").
# ocr_tesseract_lang: Tesseract only (Surya ignores this — multilingual model).
# ocr_max_images_per_page: 0 = all images; N>0 = OCR only the N largest images per page (cuts noise/speed).
#
# Recursive scanning: documents_dir is scanned recursively — subdirectories and cloned
# git repos are supported. Source keys in the index use relative POSIX paths
# (e.g. "papers/report.pdf", "my-repo/README.md").
# ignore_patterns: fnmatch globs tested against each path component. Directories like
# .git, node_modules, __pycache__ and binary extensions are skipped by default.
enabled_types = ["pdf", "epub", "txt", "md", "docx", "xlsx"]
ocr_embedded_images = "when_no_text"
ocr_backend = "auto"
ocr_tesseract_lang = "eng"
ocr_max_images_per_page = 12
ignore_patterns = [
    ".git", "__pycache__", "node_modules", ".venv", "venv",
    ".tox", ".mypy_cache", ".pytest_cache", "dist", "build", ".eggs",
    "*.pyc", "*.pyo", "*.o", "*.so", "*.dylib", "*.class", "*.jar",
]

# ---------------------------------------------------------------------------
# Contextual generation — LLM-generated context prepended to each chunk
# ---------------------------------------------------------------------------
#
# During ingest, each chunk is sent (alongside the full document or a
# sliding window) to an LLM, which returns a short ~75-token summary
# that situates the chunk within its document. This context is prepended
# to the chunk text *before* embedding, improving retrieval for ambiguous
# or context-dependent passages. One LLM call per chunk (one-time cost).
#
# Models here are INDEPENDENT from [llm] — you can use a small, cheap
# model for context generation while using a larger model for answering.
# Only ollama_host is shared (from [llm]) since it's the same server.
[ingestion.contextual]
# Contextual generation runs when you pass --contextualize to `embd ingest`.
# Settings below configure the backend and model used when it runs.
# Already-contextualized files are always skipped.
#
# backend: which LLM to use for generating chunk context.
#   "claude" — fast, cheap with prompt caching (cache_control: ephemeral).
#              Uses claude_model below. Requires ANTHROPIC_API_KEY in .env.
#   "ollama" — local, free, no API cost, slower. Uses ollama_model below.
#              Connects to the Ollama server at [llm].ollama_host.
#   "mlx"   — Apple Silicon only, native Metal acceleration, no server needed.
#              Uses mlx_model below. Requires: pip install 'embd[mlx]'
backend       = "ollama"
# ollama_model: Ollama model for context generation. Can differ from [llm].ollama_model.
# A small, fast model works well here — context strings are short (~75 tokens).
# Good choices: "qwen3:4b" (fast, 2.5 GB), "phi4-mini" (2.5 GB), "llama3.2" (2 GB).
ollama_model  = "qwen3:4b"
# claude_model: Claude model for context generation. Haiku is recommended —
# it's the cheapest option and context strings don't need a large model.
# Prompt caching makes repeated calls for chunks of the same doc ~10x cheaper.
claude_model  = "claude-haiku-4-5-20251001"
# mlx_model: MLX model for context generation (Apple Silicon only).
# Can differ from [llm].mlx_model. A small 4-bit model is ideal — context
# strings are short (~75 tokens) and don't need a large model.
# Downloaded once from HuggingFace to ~/.cache/huggingface/ on first run.
# Good choices: Llama-3.2-3B (~2 GB), Qwen2.5-3B (~2 GB), Mistral-7B (~4 GB).
mlx_model     = "mlx-community/Llama-3.2-3B-Instruct-4bit"
# max_doc_tokens: documents above this threshold use a sliding window of
# surrounding chunks instead of the full document text per LLM call.
# Keeps per-call input small — full-doc mode re-processes the entire document
# on every chunk call (no KV cache between calls for Ollama/MLX). Sliding window
# caps input to (2×window_chunks+1) × chunk_size chars per call.
# 4000 tokens ≈ 16,000 chars — most docs fit a few chunks; large ones slide.
# Claude is unaffected (prompt caching makes full-doc cheap across chunks).
max_doc_tokens  = 4000
# window_chunks: when sliding window is active, how many chunks before
# and after the current chunk to include as surrounding context.
# E.g., 3 means: 3 before + current + 3 after = 7 chunks per call.
window_chunks   = 3

[embedding]
# BGE-M3: 1024-dim, multilingual, 8192-token context, normalized by default.
# Alternatives: BAAI/bge-base-en-v1.5 (768-dim, English-only, lighter)
model_name = "BAAI/bge-m3"
# device: "auto" picks the best available accelerator:
#   Apple Silicon → mps, NVIDIA GPU → cuda, otherwise → cpu.
# Override with "mps", "cuda", or "cpu" if auto-detection is wrong.
device     = "auto"

[retrieval]
# top_k: how many chunks to retrieve per query (5 × 2000 chars ≈ 10 KB of context).
top_k           = 5
collection_name = "documents"
# Hybrid search weights for Reciprocal Rank Fusion (semantic + BM25).
# Must sum to 1.0. Set bm25_weight = 0 for pure semantic search.
semantic_weight = 0.8
bm25_weight     = 0.2

[llm]
# backend: "mlx" (Apple Silicon only — requires pip install 'embd[mlx]'),
#          "ollama" (any platform), or "claude" (API, any platform)
# Apple Silicon: change to "mlx" and install embd[mlx]
backend     = "mlx"

# --- MLX settings (used when backend = "mlx") ---
# Model is downloaded once from HuggingFace to ~/.cache/huggingface/ on first run.
# 48 GB unified memory recommendations:
#   mlx-community/Mixtral-8x7B-Instruct-v0.1-4bit      ~26 GB  strong generalist
#   mlx-community/Meta-Llama-3.1-8B-Instruct-4bit      ~5 GB   excellent quality/speed
#   mlx-community/Mistral-7B-Instruct-v0.3-4bit        ~4 GB   fast baseline
mlx_model   = "mlx-community/Mixtral-8x7B-Instruct-v0.1-4bit"
temperature = 0.1    # low temperature reduces hallucination for factual Q&A
max_tokens  = 512

# System prompt: "grounded" = answer only from retrieved passages (default).
# "research" = use docs + web snippets as evidence, allow labeled synthesis (good with Claude + /search).
# If system_prompt is set (multi-line string), it replaces the preset entirely.
system_prompt_preset = "research" #"grounded"
# system_prompt = """
# """

# --- Ollama settings (used when backend = "ollama") ---
# Requires: brew install ollama && ollama serve && ollama pull llama3.2
ollama_model = "llama3.2"
ollama_host  = "http://localhost:11434"

# --- Claude settings (used when backend = "claude") ---
# Set ANTHROPIC_API_KEY in .env (recommended) or your shell.
claude_model = "claude-sonnet-4-6"
# claude_api_key = "..."  # prefer .env — see .env.example


[search]
# SearXNG instance URL for web search. Run your own or use a public instance.
searxng_url  = "http://localhost:8888/"
max_results  = 3

# HTTP retrieval API: `embd serve` — OpenAI-style POST /query for ChatGPT Actions.
# Prefer EMBD_API_KEY in the environment over storing a secret here.
[server]
host = "0.0.0.0"
port = 8000
# api_key = "paste output of: openssl rand -hex 32"
